<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Material Request - Storage Solutions JO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f7f7;color:#111;min-height:100vh}
.hdr{background:#007B7B;color:#fff;padding:14px 16px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.65;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0efef}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:800;cursor:pointer;border-bottom:3px solid transparent;color:#999;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:#007B7B;border-bottom-color:#007B7B}
.screen{display:none;padding:14px;max-width:560px;margin:0 auto;padding-bottom:80px}
.screen.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,80,80,.08);margin-top:14px}
.card-title{font-size:12px;font-weight:800;color:#007B7B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.frow{margin-bottom:12px;position:relative}
.inp{width:100%;padding:12px;border:1.5px solid #c8dede;border-radius:8px;font-size:15px;color:#111;background:#fff;outline:none;transition:border-color .15s}
.inp:focus{border-color:#007B7B}
.btn-main{width:100%;padding:14px;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-main.dark{background:#005a5a}
.btn-main:disabled{background:#b0c8c8;cursor:not-allowed}
.btn-sm{padding:8px 14px;background:#e0f2f2;border:none;border-radius:7px;color:#007B7B;font-size:13px;font-weight:700;cursor:pointer}
.item-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #e8f0f0;gap:8px}
.item-row:last-child{border-bottom:none}
.item-body{flex:1}
.item-body .ds{font-size:14px;font-weight:600;color:#111}
.item-body .ss{font-size:11px;color:#007B7B;font-weight:700;margin-top:2px}
.item-body .qty{font-size:12px;color:#555;margin-top:2px}
.rm-btn{background:none;border:none;color:#c02020;font-size:20px;cursor:pointer;padding:2px 8px;flex-shrink:0}
.badge{display:inline-block;background:#007B7B;color:#fff;border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700;margin-left:6px}
.alert-box{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;font-weight:600}
.alert-box.ok{background:#d1fae5;border:1.5px solid #6ee7b7;color:#065f46}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#005a5a;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:2000;max-width:320px;width:90%;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}
.toast.ok{background:#065f46}
.toast.err{background:#991b1b}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.suggest-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #007B7B;border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,80,80,.15);display:none}
.suggest-list.open{display:block}
.suggest-item{padding:11px 14px;border-bottom:1px solid #e8f0f0;cursor:pointer;font-size:14px;font-weight:600;color:#111}
.suggest-item:active{background:#e0f2f2}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #007B7B;border-radius:8px;z-index:100;max-height:300px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,80,80,.18);display:none}
.search-results.open{display:block}
.search-item{padding:13px 14px;border-bottom:1px solid #e8f0f0;cursor:pointer}
.search-item:active{background:#e0f2f2}
.search-item .si-desc{font-size:14px;font-weight:700;color:#111}
.search-item .si-stock{font-size:11px;color:#007B7B;font-weight:700;margin-top:2px}
.search-item .si-avail{font-size:12px;margin-top:3px}
.search-item .avail{color:#065f46;font-weight:800}
.search-item .total{color:#aaa}
.searching{padding:14px;font-size:13px;color:#888;text-align:center}
.selected-box{background:#e6f5f5;border:1.5px solid #007B7B;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.selected-box .sd{font-size:14px;font-weight:700;color:#007B7B}
.selected-box .ss{font-size:11px;color:#005a5a;font-weight:700;margin-top:2px}
.selected-box .sa{font-size:12px;color:#065f46;font-weight:700;margin-top:2px}
.qty-row{display:flex;align-items:flex-end;gap:10px}
.qty-inp{width:100px;padding:12px;border:1.5px solid #c8dede;border-radius:8px;font-size:16px;color:#111;outline:none}
.qty-inp:focus{border-color:#007B7B}
.btn-add{padding:12px 20px;background:#007B7B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.req-row{background:#f8fffe;border:1.5px solid #c8dede;border-radius:10px;padding:12px;margin-bottom:8px}
.req-deliver{font-size:16px;font-weight:700;color:#111;margin-bottom:2px}
.req-meta{font-size:11px;color:#888;margin-top:6px}
.req-item{font-size:13px;color:#444;padding:2px 0}
.req-qty-badge{display:inline-block;background:#007B7B;color:#fff;border-radius:5px;padding:1px 7px;font-size:12px;font-weight:700;margin-right:5px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">Storage Solutions JO</div>
  <div class="hdr-sub">Material Request</div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-new"  onclick="switchTab('new')">New Request</div>
  <div class="tab"        id="tab-view" onclick="switchTab('view')">View Requests</div>
</div>

<div class="screen active" id="screen-new">
  <div class="card">
    <div class="card-title">Request Details</div>

    <div class="frow">
      <div class="lbl">Deliver To (Solis Client) *</div>
      <div style="position:relative">
        <input class="inp" id="req-endclient" placeholder="Type client name..." oninput="onEndClientInput()" autocomplete="off">
        <div class="suggest-list" id="endclient-suggest"></div>
      </div>
      <div style="font-size:11px;color:#888;margin-top:4px">⚠ Locked — warehouse cannot change this</div>
    </div>

    <div class="frow" style="display:flex;gap:10px">
      <div style="flex:1">
        <div class="lbl">Ordered By *</div>
        <input class="inp" id="req-name" placeholder="Staff name" autocomplete="off">
      </div>
      <div style="width:120px">
        <div class="lbl">Staff Code *</div>
        <input class="inp" id="req-staffcode" placeholder="e.g. M01" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Add Items <span class="badge" id="item-count">0</span></div>

    <div class="frow" style="position:relative">
      <div class="lbl">Search Item (any stock)</div>
      <input class="inp" id="desc-search" placeholder="Type to search — e.g. battery, HYS, inverter..." oninput="onSearchInput()" autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>

    <div id="selected-item-row" style="display:none;margin-bottom:10px">
      <div class="selected-box">
        <div class="sd" id="selected-item-name"></div>
        <div class="ss" id="selected-item-stock"></div>
        <div class="sa" id="selected-item-avail"></div>
      </div>
      <div class="qty-row">
        <div>
          <div class="lbl">Quantity</div>
          <input class="qty-inp" id="item-qty" type="number" min="1" placeholder="Qty" onkeydown="if(event.key==='Enter')addItem()">
        </div>
        <button class="btn-add" onclick="addItem()">+ Add Item</button>
      </div>
    </div>

    <div id="items-list"></div>
  </div>

  <div id="submit-result"></div>
  <button class="btn-main dark" id="btn-submit" onclick="submitRequest()">Submit Material Request</button>
</div>

<div class="screen" id="screen-view">
  <div style="padding-top:4px">
    <button class="btn-sm" onclick="loadRequests()">↻ Refresh</button>
    <div id="req-list" style="margin-top:12px">
      <div style="text-align:center;padding:24px;color:#aaa;font-size:13px">Tap Refresh to load</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
var GAS_URL = '// ============================================================
// Storage Solutions JO - Solis Inventory System
// Code.gs - Fixed Final May 2026
// ============================================================

var NOTIFY_EMAIL  = 'operations@storagesolutions.jo';
var GRV_GIV_SHEET = 'GRV and GIV to invoice';
var SERIAL_COL    = 'Serial No';
var GRV_START     = 8000;
var GIV_START     = 8500;
var STAGING_SHEET = 'Scan Staging';

var STOCK_SHEETS = ['Huawei Stock', 'Hoymiles Stock', 'Chisage Stock', 'Longi Stock'];

// Material Requests — hardcoded column positions (0-based)
// submitMaterialRequest writes: Timestamp(0) StockType(1) ClientName(2) D/O(3)
// ItemDesc(4) Qty(5) LineItemsJSON(6) RequestorName(7) AuthCode(8) Status(9) EndClient(10)
var MR_STATUS_COL    = 9;
var MR_ENDCLIENT_COL = 10;
var MR_CLIENT_COL    = 2;
var MR_LINEITEMS_COL = 6;
var MR_REQUESTOR_COL = 7;
var MR_TIMESTAMP_COL = 0;
var MR_STOCKTYPE_COL = 1;
var MR_DO_COL        = 3;

// ============================================================
// ROUTING
// ============================================================
function doGet(e) {
  var action = e && e.parameter && e.parameter.action;
  if (action) return handleAction(action, e.parameter);
  return ContentService.createTextOutput('Storage Solutions JO - Solis API').setMimeType(ContentService.MimeType.TEXT);
}

function doPost(e) {
  try {
    var action = e.parameter && e.parameter.action;
    var params = {};
    if (e.postData && e.postData.contents) {
      try { params = JSON.parse(e.postData.contents); } catch(ex) {}
    }
    return handleAction(action, params);
  } catch(err) {
    return makeResponse({ok: false, msg: 'Server error: ' + err.message});
  }
}

function handleAction(action, params) {
  switch(action) {
    case 'getConfig':             return makeResponse(getConfig());
    case 'searchDescription':     return makeResponse(searchDescriptionAllSheets(params.query));
    case 'getAnticipated':        return makeResponse(getAnticipated(params.stockSheet));
    case 'lookupSerial':          return makeResponse(lookupSerialAllSheets(params));
    case 'scanReceive':           return makeResponse(lookupSerialAllSheets(params));
    case 'confirmReceive':        return makeResponse(confirmReceive(params));
    case 'getMaterialRequests':   return makeResponse(getMaterialRequests());
    case 'submitMaterialRequest': return makeResponse(submitMaterialRequest(params));
    case 'scanDispatch':          return makeResponse(scanDispatchAllSheets(params));
    case 'confirmDispatch':       return makeResponse(confirmDispatch(params));
    case 'getAtDispatch':         return makeResponse(getAtDispatchAllSheets(params.clientName));
    case 'getAtDispatchAll':      return makeResponse(getAtDispatchAllSheets(params.clientName));
    case 'confirmPickup':         return makeResponse(confirmPickup(params));
    case 'autoSave':              return makeResponse(autoSaveSession(params));
    case 'getSession':            return makeResponse(getSession(params.sessionId));
    case 'clearSession':          return makeResponse(clearSession(params.sessionId));
    case 'requestOverride':       return makeResponse(requestOverride(params));
    case 'debugSerial':           return makeResponse(debugSerial(params));
    case 'debugRequests':         return makeResponse(debugRequests());
    default:                      return makeResponse({ok: false, msg: 'Unknown action: ' + action});
  }
}

function makeResponse(data) {
  var out = ContentService.createTextOutput(JSON.stringify(data));
  out.setMimeType(ContentService.MimeType.JSON);
  return out;
}

// ============================================================
// ON EDIT TRIGGER
// ============================================================
function onEditTrigger(e) {
  try {
    var sheet = e.source.getActiveSheet();
    var sheetName = sheet.getName();
    if (STOCK_SHEETS.indexOf(sheetName) < 0) return;
    var range = e.range;
    var row = range.getRow();
    var col = range.getColumn();
    if (row < 2) return;
    var hdr = getHdr(sheet);
    var givCol = colIdx(hdr, 'GIV') + 1;
    if (col !== givCol) return;
    var givNo = range.getValue().toString().trim();
    if (!givNo || givNo === '0' || givNo === '') return;
    var rowData = sheet.getRange(row, 1, 1, sheet.getLastColumn()).getValues()[0];
    var serial      = colVal(rowData, hdr, SERIAL_COL).toString().trim();
    var description = colVal(rowData, hdr, 'Description').toString().trim();
    var clientName  = colVal(rowData, hdr, 'Client').toString().trim();
    var givDate     = colVal(rowData, hdr, 'GIV Date') || new Date();
    _logToInvoicingManual(givNo, sheetName, clientName, serial, description, givDate);
  } catch(err) {}
}

function _logToInvoicingManual(givNo, stockSheet, clientName, serial, description, date) {
  var sh = getSheet(GRV_GIV_SHEET);
  if (!sh) return;
  if (sh.getLastRow() > 1) {
    var existing = sh.getDataRange().getValues();
    var hdr = existing[0];
    var givIdx = hdr.indexOf('GIV No');
    var snIdx  = hdr.indexOf('Serial No');
    if (givIdx >= 0 && snIdx >= 0) {
      for (var i = 1; i < existing.length; i++) {
        if (existing[i][givIdx].toString() === givNo.toString() &&
            existing[i][snIdx].toString() === serial) return;
      }
    }
  }
  if (sh.getLastRow() === 0) {
    sh.getRange(1,1,1,9).setValues([['Type','Number','Stock Sheet','Client','Item Description','Serial No','Date','Driver','License Plate']]);
  }
  sh.getRange(sh.getLastRow()+1, 1, 1, 6).setValues([['GIV', givNo, stockSheet, clientName, description, serial]]);
}

// ============================================================
// SESSION
// ============================================================
function autoSaveSession(p) {
  try {
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sh = ss.getSheetByName(STAGING_SHEET);
    if (!sh) {
      sh = ss.insertSheet(STAGING_SHEET);
      sh.getRange(1,1,1,6).setValues([['Session ID','Type','Stock Sheet','Client','Serial No','Timestamp']]);
    }
    var sessionId = p.sessionId || '';
    var items = p.items || [];
    if (sh.getLastRow() > 1) {
      var data = sh.getDataRange().getValues();
      var rowsToDelete = [];
      for (var i = data.length - 1; i >= 1; i--) {
        if (data[i][0].toString() === sessionId) rowsToDelete.push(i + 1);
      }
      rowsToDelete.forEach(function(r) { sh.deleteRow(r); });
    }
    items.forEach(function(item) {
      sh.getRange(sh.getLastRow()+1, 1, 1, 6).setValues([[sessionId, p.type||'', item.stockSheet||'', p.clientName||'', item.serial||'', new Date()]]);
    });
    return {ok: true, msg: 'Session saved: ' + items.length + ' items'};
  } catch(e) { return {ok: false, msg: 'Error: ' + e.message}; }
}

function getSession(sessionId) {
  try {
    var sh = getSheet(STAGING_SHEET);
    if (!sh || sh.getLastRow() < 2) return {ok: true, items: []};
    var data = sh.getDataRange().getValues();
    var items = [];
    for (var i = 1; i < data.length; i++) {
      if (data[i][0].toString() === sessionId)
        items.push({type:data[i][1], stockSheet:data[i][2], clientName:data[i][3], serial:data[i][4]});
    }
    return {ok: true, items: items};
  } catch(e) { return {ok: false, msg: 'Error: ' + e.message, items: []}; }
}

function clearSession(sessionId) {
  try {
    var sh = getSheet(STAGING_SHEET);
    if (!sh || sh.getLastRow() < 2) return {ok: true};
    var data = sh.getDataRange().getValues();
    for (var i = data.length - 1; i >= 1; i--) {
      if (data[i][0].toString() === sessionId) sh.deleteRow(i + 1);
    }
    return {ok: true};
  } catch(e) { return {ok: false, msg: 'Error: ' + e.message}; }
}

// ============================================================
// HELPERS
// ============================================================
function getSheet(name) { return SpreadsheetApp.getActiveSpreadsheet().getSheetByName(name); }
function getHdr(sheet) { return sheet.getRange(1,1,1,sheet.getLastColumn()).getValues()[0].map(function(h){ return h.toString().trim(); }); }
function colIdx(hdr, name) { return hdr.indexOf(name); }
function colVal(row, hdr, name) { var i = colIdx(hdr, name); return i >= 0 ? row[i] : ''; }
function normalize(str) { return (str||'').toString().toLowerCase().replace(/\s+/g,'').replace(/[-_]/g,''); }
function getSerial(p) { return ((p.serial || p.serialNo || '').toString().trim()); }

function isAvailableRow(row, hdr) {
  var grv      = colVal(row, hdr, 'GRV').toString().trim();
  var giv      = colVal(row, hdr, 'GIV').toString().trim();
  var location = colVal(row, hdr, 'Location').toString().trim();
  var serial   = colVal(row, hdr, SERIAL_COL).toString().trim();
  return !!(serial && grv && grv !== '' &&
         (!giv || giv === '0' || giv === '') &&
         location !== 'At Dispatch' && location !== 'Issued');
}

// Finds location of oldest available unit of a description
// Falls back to all sheets if the hinted sheet name is not found (handles old sheet names)
function getOldestAvailableLocation(description, stockSheetHint) {
  var sheetsToSearch = STOCK_SHEETS;
  if (stockSheetHint && stockSheetHint !== '') {
    var hintSh = getSheet(stockSheetHint);
    if (hintSh) sheetsToSearch = [stockSheetHint];
    // else fall back to all sheets (handles old names like 'Huawei Main Stock')
  }
  var bestLocation = '';
  var bestDate = null;
  sheetsToSearch.forEach(function(sheetName) {
    var sh = getSheet(sheetName);
    if (!sh || sh.getLastRow() < 2) return;
    var data = sh.getDataRange().getValues();
    var hdr  = getHdr(sh);
    for (var i = 1; i < data.length; i++) {
      var desc = colVal(data[i], hdr, 'Description').toString().trim();
      if (normalize(desc) !== normalize(description)) continue;
      if (!isAvailableRow(data[i], hdr)) continue;
      var dateVal = data[i][3]; // Column D = Date In
      var date = dateVal ? new Date(dateVal) : null;
      if (!bestDate || (date && date < bestDate)) {
        bestDate = date;
        bestLocation = colVal(data[i], hdr, 'Location').toString().trim();
      }
    }
  });
  return bestLocation;
}

// ============================================================
// GRV / GIV COUNTERS
// ============================================================
function getNextGRV() {
  var max = GRV_START;
  STOCK_SHEETS.forEach(function(sheetName) {
    var sh = getSheet(sheetName);
    if (!sh || sh.getLastRow() < 2) return;
    var data = sh.getDataRange().getValues();
    var hdr  = getHdr(sh);
    for (var i = 1; i < data.length; i++) {
      var n = parseInt(colVal(data[i], hdr, 'GRV'));
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return max + 1;
}

function getNextGIV() {
  var max = GIV_START;
  STOCK_SHEETS.forEach(function(sheetName) {
    var sh = getSheet(sheetName);
    if (!sh || sh.getLastRow() < 2) return;
    var data = sh.getDataRange().getValues();
    var hdr  = getHdr(sh);
    for (var i = 1; i < data.length; i++) {
      var n = parseInt(colVal(data[i], hdr, 'GIV'));
      if (!isNaN(n) && n > max) max = n;
    }
  });
  return max + 1;
}

function getConfig() { return {stockSheets: STOCK_SHEETS, nextGRV: getNextGRV(), nextGIV: getNextGIV()}; }

// ============================================================
// SEARCH DESCRIPTION
// ============================================================
function searchDescriptionAllSheets(query) {
  if (!query || query.length < 2) return {ok: true, results: []};
  var qNorm = normalize(query);
  var grouped = {};
  STOCK_SHEETS.forEach(function(sheetName) {
    var sh = getSheet(sheetName);
    if (!sh || sh.getLastRow() < 2) return;
    var data = sh.getDataRange().getValues();
    var hdr  = getHdr(sh);
    for (var i = 1; i < data.length; i++) {
      var desc   = colVal(data[i], hdr, 'Description').toString().trim();
      var partNo = colVal(data[i], hdr, 'Part No').toString().trim();
      if (!desc) continue;
      if (normalize(desc).indexOf(qNorm) < 0) continue;
      var avail = isAvailableRow(data[i], hdr);
      var key = normalize(desc) + '||' + sheetName;
      if (!grouped[key]) grouped[key] = {description:desc, partNo:partNo, stockSheet:sheetName, available:0, total:0};
      grouped[key].total++;
      if (avail) grouped[key].available++;
    }
  });
  return {ok: true, results: Object.keys(grouped).map(function(k){ return grouped[k]; })};
}

// ============================================================
// GET ANTICIPATED
// ============================================================
function getAnticipated(stockSheetName) {
  var sh = getSheet(stockSheetName);
  if (!sh) return {ok: false, msg: 'Sheet not found: ' + stockSheetName, items: []};
  if (sh.getLastRow() < 2) return {ok: true, items: []};
  var data = sh.getDataRange().getValues();
  var hdr  = getHdr(sh);
  var items = [];
  for (var i = 1; i < data.length; i++) {
    var serial = colVal(data[i], hdr, SERIAL_COL).toString().trim();
    var desc   = colVal(data[i], hdr, 'Description').toString().trim();
    var grv    = colVal(data[i], hdr, 'GRV').toString().trim();
    if ((serial || desc) && !grv)
      items.push({rowIndex:i+1, serial:serial,
        paletteNo:colVal(data[i],hdr,'Palette No').toString().trim(),
        partNo:colVal(data[i],hdr,'Part No').toString().trim(),
        description:desc});
  }
  return {ok: true, items: items};
}

// ============================================================
// LOOKUP SERIAL
// ============================================================
function lookupSerialAllSheets(p) {
  var serial = getSerial(p);
  if (!serial) return {ok: false, msg: 'No serial number provided'};
  var sheetsToSearch = p.stockSheet ? [p.stockSheet] : STOCK_SHEETS;
  for (var s = 0; s < sheetsToSearch.length; s++) {
    var sh = getSheet(sheetsToSearch[s]);
    if (!sh) continue;
    var data = sh.getDataRange().getValues();
    var hdr  = getHdr(sh);
    for (var i = 1; i < data.length; i++) {
      var rowSerial = colVal(data[i], hdr, SERIAL_COL).toString().trim();
      var rowGRV    = colVal(data[i], hdr, 'GRV').toString().trim();
      if (rowSerial.toUpperCase() !== serial.toUpperCase()) continue;
      if (rowGRV) return {ok: false, msg: 'Already received - GRV ' + rowGRV};
      return {ok:true, found:true, rowIndex:i+1, stockSheet:sheetsToSearch[s], serial:rowSerial,
        partNo:colVal(data[i],hdr,'Part No').toString().trim(),
        description:colVal(data[i],hdr,'Description').toString().trim(),
        location:colVal(data[i],hdr,'Location').toString().trim(),
        paletteNo:colVal(data[i],hdr,'Palette No').toString().trim()};
    }
  }
  return {ok: false, notFound: true, msg: 'Serial No not found: ' + serial};
}

// ============================================================
// GET MATERIAL REQUESTS
// Shows all requests except Completed and Cancelled
// Status is hardcoded at col 9, EndClient at col 10
// ============================================================
function getMaterialRequests() {
  var sh = getSheet('Material Requests');
  if (!sh || sh.getLastRow() < 2) return {ok: true, items: []};
  var data = sh.getDataRange().getValues();
  var items = [];
  for (var i = 1; i < data.length; i++) {
    var row = data[i];
    var status = row[MR_STATUS_COL] ? row[MR_STATUS_COL].toString().trim() : '';
    // Skip only completed or cancelled — show everything else
    if (status === 'Completed' || status === 'Cancelled') continue;
    // Line items JSON at col 6
    var lineItemsRaw = row[MR_LINEITEMS_COL] ? row[MR_LINEITEMS_COL].toString().trim() : '';
    var lineItems = [];
    try { lineItems = JSON.parse(lineItemsRaw); } catch(e) {
      var desc = row[4] ? row[4].toString().trim() : '';
      var qty  = row[5] ? parseInt(row[5]) || 1 : 1;
      if (desc) lineItems = [{description:desc, quantity:qty}];
    }
    // Add location of oldest available unit per line item
    lineItems = lineItems.map(function(l) {
      l.location = getOldestAvailableLocation(l.description, l.stockSheet || '');
      return l;
    });
    var clientName = row[MR_CLIENT_COL] ? row[MR_CLIENT_COL].toString().trim() : '';
    var endClient  = row[MR_ENDCLIENT_COL] ? row[MR_ENDCLIENT_COL].toString().trim() : '';
    items.push({
      rowIndex:      i + 1,
      stockType:     row[MR_STOCKTYPE_COL] ? row[MR_STOCKTYPE_COL].toString().trim() : '',
      clientName:    clientName,
      endClientName: endClient || clientName,
      doNumber:      row[MR_DO_COL] ? row[MR_DO_COL].toString().trim() : '',
      lineItems:     lineItems,
      requestor:     row[MR_REQUESTOR_COL] ? row[MR_REQUESTOR_COL].toString().trim() : '',
      timestamp:     row[MR_TIMESTAMP_COL] ? row[MR_TIMESTAMP_COL].toString().trim() : ''
    });
  }
  return {ok: true, items: items};
}

// ============================================================
// SCAN DISPATCH
// ============================================================
function scanDispatchAllSheets(p) {
  try {
    var serial=getSerial(p);
    for(var s=0;s<STOCK_SHEETS.length;s++){
      var sheetName=STOCK_SHEETS[s], sh=getSheet(sheetName);
      if(!sh)continue;
      var data=sh.getDataRange().getValues(), hdr=getHdr(sh);
      for(var i=1;i<data.length;i++){
        var rowSerial=colVal(data[i],hdr,SERIAL_COL).toString().trim();
        if(rowSerial.toUpperCase()!==serial.toUpperCase())continue;
        var rowGIV=colVal(data[i],hdr,'GIV').toString().trim();
        var rowStatus=colVal(data[i],hdr,'Location').toString().trim();
        var matchDesc=colVal(data[i],hdr,'Description').toString().trim();
        if(rowGIV&&rowGIV!=='0')return{ok:false, msg:'Already issued - GIV '+rowGIV};
        if(rowStatus==='At Dispatch')return{ok:false, msg:'Already at dispatch'};
        if(rowStatus==='Issued')return{ok:false, msg:'Already issued'};
        // FIFO check — Column D (index 3) = Date In
        var fifoWarning='', scannedDateVal=data[i][3];
        if(scannedDateVal){
          var scannedDate=new Date(scannedDateVal);
          for(var j=1;j<data.length;j++){
            if(j===i)continue;
            var jDesc=colVal(data[j],hdr,'Description').toString().trim();
            var jGIV=colVal(data[j],hdr,'GIV').toString().trim();
            var jStatus=colVal(data[j],hdr,'Location').toString().trim();
            var jGRV=colVal(data[j],hdr,'GRV').toString().trim();
            var jDateVal=data[j][3];
            if(normalize(jDesc)!==normalize(matchDesc))continue;
            if(!jGRV||jGRV==='')continue;
            if(jGIV&&jGIV!=='0'&&jGIV!=='')continue;
            if(jStatus==='At Dispatch'||jStatus==='Issued')continue;
            if(!jDateVal)continue;
            if(new Date(jDateVal)<scannedDate){
              fifoWarning='Older item exists (received '+Utilities.formatDate(new Date(jDateVal),Session.getScriptTimeZone(),'dd/MM/yyyy')+').';
              break;
            }
          }
        }
        return{ok:true, found:true, rowIndex:i+1, stockSheet:sheetName, serial:rowSerial,
          partNo:colVal(data[i],hdr,'Part No').toString().trim(),
          description:matchDesc, location:rowStatus, fifoWarning:fifoWarning};
      }
    }
    return{ok:false, notFound:true, msg:'Serial No not found: '+serial};
  }catch(e){return{ok:false, msg:'Error: '+e.message};}
}

// ============================================================
// CONFIRM DISPATCH
// ============================================================
function confirmDispatch(p) {
  try {
    var items=p.items||[], sheetGroups={};
    items.forEach(function(item){
      var s=item.stockSheet;
      if(!sheetGroups[s])sheetGroups[s]=[];
      sheetGroups[s].push(item);
    });
    Object.keys(sheetGroups).forEach(function(sheetName){
      var sh=getSheet(sheetName); if(!sh)return;
      var hdr=getHdr(sh);
      var iStatus=colIdx(hdr,'Location')+1;
      var iClient=colIdx(hdr,'Client')+1;
      sheetGroups[sheetName].forEach(function(item){
        if(!item.rowIndex)return;
        if(iStatus>0)sh.getRange(item.rowIndex,iStatus).setValue('At Dispatch');
        if(iClient>0)sh.getRange(item.rowIndex,iClient).setValue(p.clientName||'');
      });
    });
    var itemLines=items.map(function(item){return '  - '+(item.description||'')+'  S/N: '+(item.serial||'');});
    _updateRequestStatus(p.clientName,'At Dispatch');
    MailApp.sendEmail({to:NOTIFY_EMAIL,
      subject:'Dispatch Ready - '+(p.clientName||'')+' - '+(new Date().toLocaleDateString()),
      body:'Items moved to At Dispatch:\n\nClient: '+(p.clientName||'')+'\nItems ('+items.length+'):\n'+itemLines.join('\n')+'\n\n- Storage Solutions JO'});
    return{ok:true, msg:items.length+' items confirmed at dispatch'};
  }catch(e){return{ok:false, msg:'Error: '+e.message};}
}

// ============================================================
// UPDATE MATERIAL REQUEST STATUS
// Status hardcoded at col 9 (col J)
// ============================================================
function _updateRequestStatus(clientName, newStatus) {
  try {
    var sh = getSheet('Material Requests');
    if (!sh || sh.getLastRow() < 2) return;
    var data = sh.getDataRange().getValues();
    for (var i = 1; i < data.length; i++) {
      var rowClient = data[i][MR_CLIENT_COL] ? data[i][MR_CLIENT_COL].toString().trim().toLowerCase() : '';
      if (rowClient !== clientName.toLowerCase()) continue;
      var rowStatus = data[i][MR_STATUS_COL] ? data[i][MR_STATUS_COL].toString().trim() : '';
      if (rowStatus === 'Completed' || rowStatus === 'Cancelled') continue;
      if (newStatus === 'Completed') {
        sh.getRange(i+1, MR_STATUS_COL+1).setValue('Completed');
      } else if (newStatus === 'At Dispatch') {
        sh.getRange(i+1, MR_STATUS_COL+1).setValue('At Dispatch');
      }
    }
  } catch(e) {}
}

    el.innerHTML = items.map(function(it){
      var lines = (it.lineItems||[]).map(function(l){
        return '<div class="req-item"><span class="req-qty-badge">'+l.quantity+'</span>'+esc(l.description)+(l.stockSheet?' <span style="font-size:10px;color:#888;">('+esc(l.stockSheet)+')</span>':'')+'</div>';
      }).join('');
      var deliver = it.endClientName || it.clientName || '';
      return '<div class="req-row">'+
        '<div class="req-deliver">📦 '+esc(deliver)+'</div>'+
        lines+
        '<div class="req-meta">By '+esc(it.requestor)+' — '+esc(it.timestamp)+'</div>'+
      '</div>';
    }).join('');
  });
}

function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(type||'')+' show';setTimeout(function(){el.classList.remove('show');},3000);}
function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
