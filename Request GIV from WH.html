<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Material Request - Storage Solutions JO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f7f7;color:#111;min-height:100vh}
.hdr{background:#007B7B;color:#fff;padding:14px 16px}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.65;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e0efef}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:11px;font-weight:800;cursor:pointer;border-bottom:3px solid transparent;color:#999;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:#007B7B;border-bottom-color:#007B7B}
.screen{display:none;padding:14px;max-width:560px;margin:0 auto;padding-bottom:80px}
.screen.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,80,80,.08);margin-top:14px}
.card-title{font-size:12px;font-weight:800;color:#007B7B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.lbl{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.frow{margin-bottom:12px;position:relative}
.inp{width:100%;padding:12px;border:1.5px solid #c8dede;border-radius:8px;font-size:15px;color:#111;background:#fff;outline:none;transition:border-color .15s}
.inp:focus{border-color:#007B7B}
.btn-main{width:100%;padding:14px;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-main.dark{background:#005a5a}
.btn-main:disabled{background:#b0c8c8;cursor:not-allowed}
.btn-sm{padding:8px 14px;background:#e0f2f2;border:none;border-radius:7px;color:#007B7B;font-size:13px;font-weight:700;cursor:pointer}
.item-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #e8f0f0;gap:8px}
.item-row:last-child{border-bottom:none}
.item-body{flex:1}
.item-body .ds{font-size:14px;font-weight:600;color:#111}
.item-body .ss{font-size:11px;color:#007B7B;font-weight:700;margin-top:2px}
.item-body .qty{font-size:12px;color:#555;margin-top:2px}
.rm-btn{background:none;border:none;color:#c02020;font-size:20px;cursor:pointer;padding:2px 8px;flex-shrink:0}
.badge{display:inline-block;background:#007B7B;color:#fff;border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700;margin-left:6px}
.alert-box{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;font-weight:600}
.alert-box.ok{background:#d1fae5;border:1.5px solid #6ee7b7;color:#065f46}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#005a5a;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:2000;max-width:320px;width:90%;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}
.toast.ok{background:#065f46}
.toast.err{background:#991b1b}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.suggest-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #007B7B;border-radius:8px;z-index:100;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,80,80,.15);display:none}
.suggest-list.open{display:block}
.suggest-item{padding:11px 14px;border-bottom:1px solid #e8f0f0;cursor:pointer;font-size:14px;font-weight:600;color:#111}
.suggest-item:active{background:#e0f2f2}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #007B7B;border-radius:8px;z-index:100;max-height:300px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,80,80,.18);display:none}
.search-results.open{display:block}
.search-item{padding:13px 14px;border-bottom:1px solid #e8f0f0;cursor:pointer}
.search-item:active{background:#e0f2f2}
.search-item .si-desc{font-size:14px;font-weight:700;color:#111}
.search-item .si-stock{font-size:11px;color:#007B7B;font-weight:700;margin-top:2px}
.search-item .si-avail{font-size:12px;margin-top:3px}
.search-item .avail{color:#065f46;font-weight:800}
.search-item .total{color:#aaa}
.searching{padding:14px;font-size:13px;color:#888;text-align:center}
.selected-box{background:#e6f5f5;border:1.5px solid #007B7B;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.selected-box .sd{font-size:14px;font-weight:700;color:#007B7B}
.selected-box .ss{font-size:11px;color:#005a5a;font-weight:700;margin-top:2px}
.selected-box .sa{font-size:12px;color:#065f46;font-weight:700;margin-top:2px}
.qty-row{display:flex;align-items:flex-end;gap:10px}
.qty-inp{width:100px;padding:12px;border:1.5px solid #c8dede;border-radius:8px;font-size:16px;color:#111;outline:none}
.qty-inp:focus{border-color:#007B7B}
.btn-add{padding:12px 20px;background:#007B7B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.req-row{background:#f8fffe;border:1.5px solid #c8dede;border-radius:10px;padding:12px;margin-bottom:8px}
.req-deliver{font-size:16px;font-weight:700;color:#111;margin-bottom:2px}
.req-meta{font-size:11px;color:#888;margin-top:6px}
.req-item{font-size:13px;color:#444;padding:2px 0}
.req-qty-badge{display:inline-block;background:#007B7B;color:#fff;border-radius:5px;padding:1px 7px;font-size:12px;font-weight:700;margin-right:5px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">Storage Solutions JO</div>
  <div class="hdr-sub">Material Request</div>
</div>
<div class="tabs">
  <div class="tab active" id="tab-new"  onclick="switchTab('new')">New Request</div>
  <div class="tab"        id="tab-view" onclick="switchTab('view')">View Requests</div>
</div>

<div class="screen active" id="screen-new">
  <div class="card">
    <div class="card-title">Request Details</div>

    <div class="frow">
      <div class="lbl">Deliver To (Solis Client) *</div>
      <div style="position:relative">
        <input class="inp" id="req-endclient" placeholder="Type client name..." oninput="onEndClientInput()" autocomplete="off">
        <div class="suggest-list" id="endclient-suggest"></div>
      </div>
      <div style="font-size:11px;color:#888;margin-top:4px">⚠ Locked — warehouse cannot change this</div>
    </div>

    <div class="frow" style="display:flex;gap:10px">
      <div style="flex:1">
        <div class="lbl">Ordered By *</div>
        <input class="inp" id="req-name" placeholder="Staff name" autocomplete="off">
      </div>
      <div style="width:120px">
        <div class="lbl">Staff Code *</div>
        <input class="inp" id="req-staffcode" placeholder="e.g. M01" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Add Items <span class="badge" id="item-count">0</span></div>

    <div class="frow" style="position:relative">
      <div class="lbl">Search Item (any stock)</div>
      <input class="inp" id="desc-search" placeholder="Type to search — e.g. battery, HYS, inverter..." oninput="onSearchInput()" autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>

    <div id="selected-item-row" style="display:none;margin-bottom:10px">
      <div class="selected-box">
        <div class="sd" id="selected-item-name"></div>
        <div class="ss" id="selected-item-stock"></div>
        <div class="sa" id="selected-item-avail"></div>
      </div>
      <div class="qty-row">
        <div>
          <div class="lbl">Quantity</div>
          <input class="qty-inp" id="item-qty" type="number" min="1" placeholder="Qty" onkeydown="if(event.key==='Enter')addItem()">
        </div>
        <button class="btn-add" onclick="addItem()">+ Add Item</button>
      </div>
    </div>

    <div id="items-list"></div>
  </div>

  <div id="submit-result"></div>
  <button class="btn-main dark" id="btn-submit" onclick="submitRequest()">Submit Material Request</button>
</div>

<div class="screen" id="screen-view">
  <div style="padding-top:4px">
    <button class="btn-sm" onclick="loadRequests()">↻ Refresh</button>
    <div id="req-list" style="margin-top:12px">
      <div style="text-align:center;padding:24px;color:#aaa;font-size:13px">Tap Refresh to load</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyPkUA0DlZ30dtv7Y3HIPlCGyykoomRJoJOnV1QN2IJQJtBNzaYmFhspzWYekgW6xrd5Q/exec';
var lineItems = [];
var selectedDesc = '';
var selectedStock = '';
var selectedAvail = 0;
var searchTimer = null;
var endClientHistory = JSON.parse(localStorage.getItem('ssolsEndClients') || '[]');

document.addEventListener('click', function(e) {
  if (!e.target.closest('#desc-search') && !e.target.closest('#search-results'))
    document.getElementById('search-results').classList.remove('open');
  if (!e.target.closest('#req-endclient') && !e.target.closest('#endclient-suggest'))
    document.getElementById('endclient-suggest').classList.remove('open');
});

function switchTab(tab) {
  ['new','view'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('screen-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'view') loadRequests();
}

function callGAS(action, params, cb) {
  fetch(GAS_URL+'?action='+action, {method:'POST', body:JSON.stringify(params)})
    .then(function(r){return r.json();})
    .then(function(d){if(cb)cb(d);})
    .catch(function(){toast('Connection error','err');});
}

function onEndClientInput() {
  var val = document.getElementById('req-endclient').value.trim().toLowerCase();
  var el = document.getElementById('endclient-suggest');
  if (!val) { el.classList.remove('open'); return; }
  var matches = endClientHistory.filter(function(n){ return n.toLowerCase().indexOf(val) >= 0; });
  if (!matches.length) { el.classList.remove('open'); return; }
  el.innerHTML = matches.map(function(m){
    return '<div class="suggest-item" onclick="pickEndClient(\''+esc(m)+'\')">'+esc(m)+'</div>';
  }).join('');
  el.classList.add('open');
}

function pickEndClient(name) {
  document.getElementById('req-endclient').value = name;
  document.getElementById('endclient-suggest').classList.remove('open');
}

function saveEndClient(name) {
  if (!name || endClientHistory.indexOf(name) >= 0) return;
  endClientHistory.unshift(name);
  if (endClientHistory.length > 50) endClientHistory = endClientHistory.slice(0,50);
  localStorage.setItem('ssolsEndClients', JSON.stringify(endClientHistory));
}

function onSearchInput() {
  clearTimeout(searchTimer);
  var q = document.getElementById('desc-search').value.trim();
  if (q.length < 2) { document.getElementById('search-results').classList.remove('open'); return; }
  document.getElementById('search-results').innerHTML = '<div class="searching">Searching all stocks...</div>';
  document.getElementById('search-results').classList.add('open');
  searchTimer = setTimeout(function() {
    callGAS('searchDescription', {query: q}, function(res) {
      renderSearchResults(res.results || []);
    });
  }, 300);
}

function renderSearchResults(results) {
  var el = document.getElementById('search-results');
  if (!results.length) { el.innerHTML='<div class="searching">No matches found</div>'; el.classList.add('open'); return; }
  el.innerHTML = results.map(function(r) {
    var noStock = r.available === 0;
    return '<div class="search-item" onclick="selectItem(\''+esc(r.description)+'\',\''+esc(r.stockSheet)+'\','+r.available+','+r.total+')">'+
      '<div class="si-desc">'+esc(r.description)+'</div>'+
      '<div class="si-stock">'+esc(r.stockSheet)+'</div>'+
      '<div class="si-avail">'+
        '<span class="avail">'+r.available+' available</span> <span class="total">of '+r.total+'</span>'+
        (noStock?' — <span style="color:#991b1b;font-weight:700">None in stock</span>':'')+
      '</div>'+
    '</div>';
  }).join('');
  el.classList.add('open');
}

function selectItem(desc, stockSheet, available, total) {
  selectedDesc  = desc;
  selectedStock = stockSheet;
  selectedAvail = available;
  document.getElementById('desc-search').value = desc;
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('selected-item-name').textContent  = desc;
  document.getElementById('selected-item-stock').textContent = stockSheet;
  document.getElementById('selected-item-avail').textContent = available + ' available in stock';
  document.getElementById('selected-item-row').style.display = 'block';
  document.getElementById('item-qty').value = '';
  document.getElementById('item-qty').focus();
}

function addItem() {
  if (!selectedDesc) { toast('Search and select an item first','err'); return; }
  var qty = parseInt(document.getElementById('item-qty').value);
  if (!qty || qty < 1) { toast('Enter a valid quantity','err'); return; }
  lineItems.push({description: selectedDesc, stockSheet: selectedStock, quantity: qty});
  selectedDesc = ''; selectedStock = ''; selectedAvail = 0;
  document.getElementById('desc-search').value = '';
  document.getElementById('item-qty').value = '';
  document.getElementById('selected-item-row').style.display = 'none';
  renderItems();
  toast('Item added ✓','ok');
}

function renderItems() {
  var el = document.getElementById('items-list');
  document.getElementById('item-count').textContent = lineItems.length;
  if (!lineItems.length) { el.innerHTML=''; return; }
  el.innerHTML = lineItems.map(function(it,i){
    return '<div class="item-row"><div class="item-body">'+
      '<div class="ds">'+esc(it.description)+'</div>'+
      '<div class="ss">'+esc(it.stockSheet)+'</div>'+
      '<div class="qty">Qty: '+it.quantity+'</div>'+
    '</div><button class="rm-btn" onclick="lineItems.splice('+i+',1);renderItems()">✕</button></div>';
  }).join('');
}

function submitRequest() {
  var endclient = document.getElementById('req-endclient').value.trim();
  var name      = document.getElementById('req-name').value.trim();
  var staffCode = document.getElementById('req-staffcode').value.trim();
  if (!endclient) { toast('Enter Deliver To (Solis Client)','err'); return; }
  if (!name)      { toast('Enter staff name','err'); return; }
  if (!staffCode) { toast('Enter staff code','err'); return; }
  if (!lineItems.length) { toast('Add at least one item','err'); return; }

  var btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Submitting...';

  callGAS('submitMaterialRequest', {
    stockType:     lineItems[0].stockSheet || '',
    clientName:    endclient,
    endClientName: endclient,
    doNumber:      staffCode,
    requestorName: name,
    lineItems:     lineItems
  }, function(res) {
    btn.disabled = false; btn.innerHTML = 'Submit Material Request';
    if (res.ok) {
      saveEndClient(endclient);
      document.getElementById('submit-result').innerHTML =
        '<div class="alert-box ok">✓ Request submitted! Operations notified.</div>';
      lineItems = []; renderItems();
      document.getElementById('req-endclient').value = '';
      document.getElementById('req-name').value = '';
      document.getElementById('req-staffcode').value = '';
      setTimeout(function(){ document.getElementById('submit-result').innerHTML=''; }, 5000);
    } else { toast(res.msg||'Error','err'); }
  });
}

function loadRequests() {
  document.getElementById('req-list').innerHTML = '<div style="text-align:center;padding:24px;color:#aaa;font-size:13px">Loading...</div>';
  callGAS('getMaterialRequests', {}, function(res) {
    var el = document.getElementById('req-list');
    var items = res.items||[];
    if (!items.length) { el.innerHTML='<div style="text-align:center;padding:24px;color:#aaa;font-size:13px">No pending requests.</div>'; return; }
    el.innerHTML = items.map(function(it){
      var lines = (it.lineItems||[]).map(function(l){
        return '<div class="req-item"><span class="req-qty-badge">'+l.quantity+'</span>'+esc(l.description)+(l.stockSheet?' <span style="font-size:10px;color:#888;">('+esc(l.stockSheet)+')</span>':'')+'</div>';
      }).join('');
      var deliver = it.endClientName || it.clientName || '';
      return '<div class="req-row">'+
        '<div class="req-deliver">📦 '+esc(deliver)+'</div>'+
        lines+
        '<div class="req-meta">By '+esc(it.requestor)+' — '+esc(it.timestamp)+'</div>'+
      '</div>';
    }).join('');
  });
}

function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(type||'')+' show';setTimeout(function(){el.classList.remove('show');},3000);}
function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
